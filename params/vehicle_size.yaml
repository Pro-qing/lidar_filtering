# ==========================================
# 车辆尺寸与保护区域配置
# ==========================================
vehicle_rect:
  # 定义车身在 XY 平面上的二维多边形顶点坐标 (逆时针或顺时针一圈)
  # 落在该多边形内部的点云（打在车壳上的激光点）将被代码中的射线法滤除
  - {x: 0.46, y: -0.20}   # 车头坐标
  - {x: 0.40, y: -0.50}
  - {x: -0.10, y: -0.50}
  - {x: -0.10, y: -0.80}
  - {x: -1.66, y: -0.80}  # 车尾坐标
  - {x: -1.66, y: 0.75}   # 车尾坐标
  - {x: -0.10, y: 0.75}
  - {x: -0.10, y: 0.45}
  - {x: 0.40, y: 0.45}
  - {x: 0.46, y: 0.20}    # 车头坐标

vehicle_height: 1.0       # 仅剔除 Z坐标 小于等于 1.0米 的车身点云