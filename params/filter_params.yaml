# ==========================================
# 新增: 点数放宽参数说明 (2026-04-29)
# 说明:
# 1) 这些参数已经同步到上面的 base 与 behaviors 中
# 2) 如果点数仍偏少, 可以继续按以下方向微调
# ==========================================
relax_param_notes:
  main_enable: "regions.main.enable 建议保持 1, 否则主雷达不会进入滤波输出"
  single_max_dis: "regions.left/right.max_dis 从 1.5 提高到 2.2 (行为5为1.4), 增加单线远端点"
  crop_radius: "core.crop_radius 从 8.0 提高到 10.0 (行为按场景调整到 8.0/9.0/10.0)"
  height_window: "core.height_max 从 0.0 放宽到 0.3, core.height_min 从 -1.9 放宽到 -2.1"
  voxel_leaf: "core.voxel_filter 从 0.1 降到 0.08, 保留更多细节点"
  radius_outlier: "core.radius_radius 从 0.15 降到 0.12, core.radius_min_neighbors 从 2 降到 1, 减少误删"
