# ==========================================
# 点云过滤与控制参数配置
# ==========================================

# 四雷达独立使能开关
lidar_enable:
  main: true
  top: true
  left: true
  right: true

# 雷达区域过滤控制 (控制各雷达保留的有效扫描角度与距离)
regions:
  main:
    enable: 0
    min_angle: 0.0
    max_angle: 360.0
    max_dis: 0.0
    a: 0.0
    b: 360.0
    c: 0.0
    d: 360.0

  top:
    enable: 1
    min_angle: 0.0
    max_angle: 360.0
    max_dis: 0.0
    a: 0.0
    b: 360.0
    c: 0.0
    d: 360.0

  left:
    enable: 1
    max_dis: 2.2
    a: 0.0
    b: 180.0
    c: 0.0
    d: 0.0

  right:
    enable: 1
    max_dis: 2.2
    a: 180.0
    b: 360.0
    c: 0.0
    d: 0.0

# 速度动态限制过滤 (当车辆降速时，收缩扫描边界，防止低速误触发避障)
speed_limits:
  maxSpeed: 1.2
  maxLimitDis_speed: 0.5
  leftLimit_min_angle: 190.0
  leftLimit_max_angle: 90.0
  rightLimit_min_angle: 250.0
  rightLimit_max_angle: 170.0

# 核心滤波参数 (点云降采样与空间剪裁)
core:
  crop_radius: 10.0             #XY平面保留半径（米），越大点越多。
  crop_radius_x: 3.0            #裁剪圆心X偏移（前向拉长视野）
  height_max: 0.3               #Z轴高度上限（米），适当放宽以保留更多高处点云
  height_min: -2.10             #Z轴高度下限（米），适当放宽以保留更多低处点云
  height_filt: -5.0             #地面附加高度阈值（与 filter_floor 配合）。
  filter_floor: true            #是否开启地面滤除
  voxel_filter: 0.08            #体素降采样粒度（米），越小点越多。
  voxel_filter_auto: false      #是否自动调整体素滤波粒度（根据点云密度动态调整，保持稳定的点数输出）
  voxel_filter_eleva: 0.05      #电梯模式体素粒度（/lqr_dire 触发）。
  filter_transient: true        #预留，当前未实际使用。
  neighboring_points: 10        #半径滤波邻居点数阈值，越大越严格。预留，当前未实际使用。
  stand_threshold: 0.8          #静止点占比阈值，越大越严格。预留，当前未实际使用。
  time_consistency_filter: true #当前主要用于“是否更新历史缓存”，未做完整时序差分剔除。
  radius_enble: true            #半径离群点滤波开关（主要作用在PCL路径）。
  radius_radius: 0.12           #离群滤波搜索半径（米），越大越宽松。
  radius_min_neighbors: 1       #离群滤波最小邻居点数，越小越宽松。
  charge_enble: true
  charge_length: 1.2
  charge_wide: 1.2
  charge_high: 1.2
  charge_error: 1.2
  consistency_enable: false
  consistency_min_angle: -20.0
  consistency_max_angle: 20.0
  consistency_diff_dist: 0.5
  vehicle_height: 1.0           #车体过滤时的高度上限。

# 兼容字段: 双雷达一致性校验
consistency:
  enable: false
  min_angle: -20.0
  max_angle: 20.0
  diff_dist: 0.5

# 兼容字段: 充电桩识别参数
charge:
  enble: true
  length: 1.2
  wide: 1.2
  high: 1.2
  error: 1.2


# ==========================================
# 场景化动态参数覆写 (Behavior Overrides)
# 每个行为均给出完整参数集，便于独立维护
# ==========================================
behaviors:
  # Behavior 4: 电梯/特殊狭窄模式
  4:
    enable_single_lidar: false
    lidar_enable:
      main: true
      top: true
      left: false
      right: false
    regions:
      main: { enable: 1, min_angle: 0.0, max_angle: 360.0, max_dis: 0.0, a: 0.0, b: 360.0, c: 0.0, d: 360.0 }
      top: { enable: 1, min_angle: 0.0, max_angle: 360.0, max_dis: 0.0, a: 0.0, b: 360.0, c: 0.0, d: 360.0 }
      left: { enable: 1, max_dis: 2.2, a: 0.0, b: 180.0, c: 0.0, d: 0.0 }
      right: { enable: 1, max_dis: 2.2, a: 180.0, b: 360.0, c: 0.0, d: 0.0 }
    core:
      crop_radius: 4.0
      crop_radius_x: 5.0
      height_max: 0.0
      height_min: -1.85
      height_filt: -5.0
      filter_floor: false
      voxel_filter: 0.1
      voxel_filter_auto: false
      voxel_filter_eleva: 0.1
      filter_transient: false
      neighboring_points: 10
      stand_threshold: 0.8
      time_consistency_filter: true
      radius_enble: true
      radius_radius: 0.15
      radius_min_neighbors: 2
      charge_enble: true
      charge_length: 1.2
      charge_wide: 1.2
      charge_high: 1.2
      charge_error: 1.2
      consistency_enable: false
      consistency_min_angle: -20.0
      consistency_max_angle: 20.0
      consistency_diff_dist: 0.5
      vehicle_height: 1.0
    consistency: { enable: false, min_angle: -20.0, max_angle: 20.0, diff_dist: 0.5 }
    charge: { enble: true, length: 1.2, wide: 1.2, high: 1.2, error: 1.2 }

  # Behavior 2: 充电相关模式
  2:
    enable_single_lidar: true
