      left: { enable: 1, max_dis: 2.2, a: 0.0, b: 180.0, c: 0.0, d: 0.0 }
      right: { enable: 1, max_dis: 2.2, a: 180.0, b: 360.0, c: 0.0, d: 0.0 }
    core:
      crop_radius: 8.0
      crop_radius_x: 5.0
      height_max: 0.3
      height_min: -2.10
      height_filt: -5.0
      filter_floor: true
      voxel_filter: 0.08
      voxel_filter_auto: false
      voxel_filter_eleva: 0.1
      filter_transient: true
      neighboring_points: 10
      stand_threshold: 0.8
      time_consistency_filter: true
      radius_enble: true
      radius_radius: 0.12
      radius_min_neighbors: 1
      charge_enble: true
      charge_length: 1.2
      charge_wide: 1.2
      charge_high: 1.2
      charge_error: 1.2
      consistency_enable: true
      consistency_min_angle: -20.0
      consistency_max_angle: 20.0
      consistency_diff_dist: 0.5
      vehicle_height: 1.0
    consistency: { enable: true, min_angle: -20.0, max_angle: 20.0, diff_dist: 0.5 }
